<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI助手</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f0f2f5;
        }

        .header {
            background: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .chat-container {
            max-width: 600px;
            margin: 20px auto;
            background: white;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            height: 80vh;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
            max-width: 80%;
        }

        .user {
            background: #4CAF50;
            color: white;
            align-self: flex-end;
        }

        .ai {
            background: #eee;
        }

        .input-box {
            display: flex;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            outline: none;
        }

        button {
            width: 80px;
            border: none;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>

<body>

<div class="header">🤖 AI 智能助手</div>

<div class="chat-container">
    <div id="chat" class="chat-box"></div>

    <div class="input-box">
        <input type="text" id="question" placeholder="输入你的问题...">
        <button onclick="ask()">发送</button>
    </div>
</div>

<script>
    async function ask() {
        const input = document.getElementById("question");
        const question = input.value;

        if (!question) return;

        addMessage(question, "user");
        input.value = "";

        const response = await fetch("https://secure-strength-production-7c5f.up.railway.app/ask", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ question: question })
        });

        const data = await response.json();

        addMessage(data.answer, "ai");
    }

    function addMessage(text, type) {
        const chat = document.getElementById("chat");

        const msg = document.createElement("div");
        msg.className = "message " + type;
        msg.innerText = text;

        chat.appendChild(msg);
        chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById("question").addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            ask();
        }
    });
</script>

</body>
</html>
